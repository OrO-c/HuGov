{{- /* print-button.html — 打印按钮
  受 site.Params.ui.printButton 控制（全局开关）
  仅应在 single 页面模板中被引用
  使用浏览器原生 window.print() 功能
*/ -}}
{{- $enabled := site.Params.ui.printButton | default false }}
{{- if $enabled }}
<button class="print-btn" type="button" onclick="window.print()" aria-label="打印本页" title="打印">
  <svg class="print-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <polyline points="6 9 6 2 18 2 18 9"></polyline>
    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
    <rect x="6" y="14" width="12" height="8"></rect>
  </svg>
  <span class="print-btn-text">打印</span>
</button>
{{- end }}
